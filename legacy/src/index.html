<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/ghostsui@beta/ghostsui.css"
		/>
		<title>Site Moved ~ Willow (GHOST)</title>
	</head>
	<body>
		<main>
			<h2>You're Close!</h2>
			<p>
				I've moved to <a href="__DESTINATION__">willow.sh</a>! Click to
				go to forward, or wait <span id="seconds">n</span> seconds to be
				redirected automatically...
			</p>
		</main>

		<script type="module">
			const span = document.querySelector('#seconds');
			let remaining = 5;

			while (remaining > 0) {
				span.innerText = remaining--;
				await new Promise((resolve) => setTimeout(resolve, 1000));
			}

			window.location = '__DESTINATION__';
		</script>

		<style>
			body {
				display: grid;
				place-items: center;
				height: 100dvh;
			}

			main {
				text-align: center;
				max-width: 300px;
				height: fit-content;
			}
		</style>
	</body>
</html>
