name = "website"
compatibility_date = "2025-08-30"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

main = "@astrojs/cloudflare/entrypoints/server"

workers_dev = false

[[routes]]
custom_domain = true
pattern = "ghostdev.xyz"

[assets]
binding = "ASSETS"
directory = "./dist"

[observability]
enabled = true

[vars]
NODE_VERSION = "24.14.0"
